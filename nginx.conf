server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Security headers (matches backend's SecurityHeadersMiddleware) ----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'" always;
    # Only takes effect once you are actually serving over HTTPS (see README).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    gzip on;
    gzip_types text/css application/javascript application/json;

    # Static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin proxy to the backend — this is what lets the frontend call
    # a relative "/api/..." path instead of a hardcoded backend host, and
    # means the browser never has to do a cross-origin request at all.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uncomment once you have a TLS certificate mounted and a separate
    # `listen 443 ssl;` server block, to force HTTPS for every visitor:
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }
}
