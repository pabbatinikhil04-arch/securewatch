version: '3.8'

services:
  backend:
    build: ./backend
    container_name: security-platform-backend
    ports:
      - "8000:8000"   # optional in prod — only needed for direct API access/debugging
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-security_db}
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env — generate one with: openssl rand -hex 32}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      - db
    volumes:
      - ./backend:/app
    networks:
      - security-network
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: security-platform-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - security-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: security-platform-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-security_db}
    # Not published to the host in prod — only the backend container needs to reach it.
    # Uncomment for local debugging with a DB client:
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - security-network
    restart: unless-stopped

networks:
  security-network:
    driver: bridge

volumes:
  postgres_data:
