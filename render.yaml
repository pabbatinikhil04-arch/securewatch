databases:
  - name: securewatch-db
    plan: free
    databaseName: security_db
    user: securewatch

services:
  # --- Backend: FastAPI, built from backend/Dockerfile ---
  - type: web
    name: securewatch-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: securewatch-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      # Update this after the frontend's Render URL is known (Render assigns
      # it on first deploy), then redeploy the backend for CORS to allow it.
      - key: ALLOWED_ORIGINS
        value: https://securewatch-frontend.onrender.com

  # --- Frontend: static site ---
  - type: web
    name: securewatch-frontend
    runtime: static
    staticPublishPath: ./frontend
    buildCommand: ""
    envVars: []
